{% extends "base.html" %}
{% block content %}
    <h2>Your Lineup</h2>
    <ul>
        {% for pos, player in lineup.items() %}
            <li>{{ pos }}: {{ player if player else "Empty" }}</li>
        {% endfor %}
    </ul>
    <p>⭐ Average Rating: {{ avg_rating }}</p>
    <a href="{{ url_for('random_team') }}">🎲 Draft Next Player</a>
{% endblock %}
